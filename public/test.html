<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLENZ - Giriş</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden; /* Kenar çubuklarını önlemek için */
        }

        .neon-text {
            font-size: 8em;
            color: #00FF00; /* Parlak neon yeşili */
            text-align: center;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: 
                flicker 2s infinite alternate, /* Hafif titreme efekti */
                glow 1.5s infinite alternate; /* Ekstra parlama animasyonu */
            text-shadow: 
                0 0 10px #00FF00,
                0 0 20px #00FF00,
                0 0 40px #00FF00,
                0 0 80px #00FF00,
                0 0 120px #00FF00;
            position: relative;
            z-index: 1;
        }

        /* Neon titreme (flicker) efekti */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                opacity: 1;
                text-shadow:
                    0 0 10px #00FF00,
                    0 0 20px #00FF00,
                    0 0 40px #00FF00,
                    0 0 80px #00FF00,
                    0 0 120px #00FF00;
            }
            20%, 24%, 55% {
                opacity: 0.8;
                text-shadow:
                    0 0 5px #00FF00,
                    0 0 10px #00FF00,
                    0 0 20px #00FF00,
                    0 0 40px #00FF00;
            }
        }

        /* Ekstra parlama (glow) animasyonu */
        @keyframes glow {
            0% {
                text-shadow:
                    0 0 10px #00FF00,
                    0 0 20px #00FF00,
                    0 0 40px #00FF00,
                    0 0 80px #00FF00,
                    0 0 120px #00FF00;
            }
            100% {
                text-shadow:
                    0 0 5px #00FF00,
                    0 0 15px #00FF00,
                    0 0 30px #00FF00,
                    0 0 60px #00FF00,
                    0 0 100px #00FF00;
            }
        }

        /* Responsive tasarım için font boyutunu ayarla */
        @media (max-width: 768px) {
            .neon-text {
                font-size: 4em;
                letter-spacing: 3px;
            }
        }

        @media (max-width: 480px) {
            .neon-text {
                font-size: 2.5em;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <h1 class="neon-text">SOLENZ</h1>
</body>
</html>
