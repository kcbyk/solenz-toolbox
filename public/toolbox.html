<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solenz AI Toolbox</title>
    <style>
        body { background: #0c0d10; color: #ececec; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        #header { padding: 15px 20px; background: #14161b; border-bottom: 1px solid #272c36; display: flex; justify-content: space-between; align-items: center; }
        #title { font-size: 18px; font-weight: bold; color: #10a37f; text-shadow: 0 0 10px rgba(16,163,127,0.5); }
        #back-to-agent {
            background: #6c757d;
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        #back-to-agent:hover { background: #5a6268; }
        #toolbox-container {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .tool-card {
            background: #1a1d23;
            border: 1px solid #272c36;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .tool-card h3 { color: #10a37f; margin-top: 0; margin-bottom: 10px; font-size: 1.2em; }
        .tool-card input[type="text"],
        .tool-card input[type="number"],
        .tool-card textarea,
        .tool-card select {
            background: #0c0d10;
            border: 1px solid #272c36;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            width: calc(100% - 22px);
            font-size: 0.9em;
        }
        .tool-card button {
            background: #007bff;
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .tool-card button:hover { background: #0056b3; }
        .tool-output {
            background: #0c0d10;
            border: 1px solid #333;
            color: #eee;
            padding: 10px;
            border-radius: 8px;
            min-height: 50px;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.9em;
        }
        .tool-card label { display: block; margin-bottom: 5px; }
        .tool-card input[type="checkbox"] { margin-right: 5px; }
    </style>
</head>
<body>
    <div id="header">
        <div id="title">⚙️ Solenz AI Toolbox</div>
        <a href="/" id="back-to-agent">⬅️ Ajana Dön</a>
    </div>
    <div id="toolbox-container">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toolboxContainer = document.getElementById('toolbox-container');

            const tools = [
                {
                    id: 'string-reverser',
                    name: 'Metin Ters Çevirici',
                    description: 'Verilen metni tersine çevirir.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="sr-input" placeholder="Ters çevrilecek metni girin..." rows="4"></textarea>
                            <button data-tool-id="string-reverser">Ters Çevir</button>
                            <div id="sr-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('sr-input').value;
                        document.getElementById('sr-output').innerText = input.split('').reverse().join('');
                    }
                },
                {
                    id: 'word-counter',
                    name: 'Kelime Sayacı',
                    description: 'Metindeki kelime sayısını gösterir.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="wc-input" placeholder="Metni girin..." rows="4"></textarea>
                            <button data-tool-id="word-counter">Say</button>
                            <div id="wc-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('wc-input').value.trim();
                        const words = input ? input.split(/\s+/).filter(word => word !== '') : [];
                        document.getElementById('wc-output').innerText = `Kelime Sayısı: ${words.length}`;
                    }
                },
                {
                    id: 'char-counter',
                    name: 'Karakter Sayacı',
                    description: 'Metindeki karakter sayısını gösterir (boşluklar dahil).',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="cc-input" placeholder="Metni girin..." rows="4"></textarea>
                            <button data-tool-id="char-counter">Say</button>
                            <div id="cc-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('cc-input').value;
                        document.getElementById('cc-output').innerText = `Karakter Sayısı: ${input.length}`;
                    }
                },
                {
                    id: 'base64-encode',
                    name: 'Base64 Kodlayıcı',
                    description: 'Metni Base64 formatına kodlar.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="b64e-input" placeholder="Kodlanacak metni girin..." rows="4"></textarea>
                            <button data-tool-id="base64-encode">Kodla</button>
                            <div id="b64e-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('b64e-input').value;
                        document.getElementById('b64e-output').innerText = btoa(input);
                    }
                },
                {
                    id: 'base64-decode',
                    name: 'Base64 Çözücü',
                    description: 'Base64 kodlu metni orijinal haline çevirir.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="b64d-input" placeholder="Çözülecek Base64 metni girin..." rows="4"></textarea>
                            <button data-tool-id="base64-decode">Çöz</button>
                            <div id="b64d-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('b64d-input').value;
                        try {
                            document.getElementById('b64d-output').innerText = atob(input);
                        } catch (e) {
                            document.getElementById('b64d-output').innerText = 'Hata: Geçersiz Base64 formatı.';
                        }
                    }
                },
                {
                    id: 'url-encode',
                    name: 'URL Kodlayıcı',
                    description: 'Metni URL güvenli formata kodlar.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="urle-input" placeholder="Kodlanacak URL metni girin..." rows="4"></textarea>
                            <button data-tool-id="url-encode">Kodla</button>
                            <div id="urle-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('urle-input').value;
                        document.getElementById('urle-output').innerText = encodeURIComponent(input);
                    }
                },
                {
                    id: 'url-decode',
                    name: 'URL Çözücü',
                    description: 'URL kodlu metni orijinal haline çevirir.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="urld-input" placeholder="Çözülecek URL metni girin..." rows="4"></textarea>
                            <button data-tool-id="url-decode">Çöz</button>
                            <div id="urld-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('urld-input').value;
                        try {
                            document.getElementById('urld-output').innerText = decodeURIComponent(input);
                        } catch (e) {
                            document.getElementById('urld-output').innerText = 'Hata: Geçersiz URL formatı.';
                        }
                    }
                },
                {
                    id: 'md5-hash',
                    name: 'MD5 Karma',
                    description: 'Metnin MD5 karmasını hesaplar (JS tabanlı, güvenlik için kullanılmamalı).',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="md5-input" placeholder="Karma için metni girin..." rows="4"></textarea>
                            <button data-tool-id="md5-hash">Karma Oluştur</button>
                            <div id="md5-output" class="tool-output"></div>
                        `;
                    },
                    execute: async () => {
                        const input = document.getElementById('md5-input').value;
                        if (!input) {
                            document.getElementById('md5-output').innerText = '';
                            return;
                        }
                        const simpleHash = (s) => {
                            let hash = 0;
                            for (let i = 0; i < s.length; i++) {
                                hash = ((hash << 5) - hash) + s.charCodeAt(i);
                                hash |= 0;
                            }
                            return Math.abs(hash).toString(16);
                        };
                        document.getElementById('md5-output').innerText = simpleHash(input);
                    }
                },
                {
                    id: 'sha1-hash',
                    name: 'SHA-1 Karma',
                    description: 'Metnin SHA-1 karmasını hesaplar (JS tabanlı).',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="sha1-input" placeholder="Karma için metni girin..." rows="4"></textarea>
                            <button data-tool-id="sha1-hash">Karma Oluştur</button>
                            <div id="sha1-output" class="tool-output"></div>
                        `;
                    },
                    execute: async () => {
                        const input = document.getElementById('sha1-input').value;
                        const textEncoder = new TextEncoder();
                        const data = textEncoder.encode(input);
                        const hashBuffer = await crypto.subtle.digest('SHA-1', data);
                        const hashArray = Array.from(new Uint8Array(hashBuffer));
                        const hexHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                        document.getElementById('sha1-output').innerText = hexHash;
                    }
                },
                {
                    id: 'sha256-hash',
                    name: 'SHA-256 Karma',
                    description: 'Metnin SHA-256 karmasını hesaplar (JS tabanlı).',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="sha256-input" placeholder="Karma için metni girin..." rows="4"></textarea>
                            <button data-tool-id="sha256-hash">Karma Oluştur</button>
                            <div id="sha256-output" class="tool-output"></div>
                        `;
                    },
                    execute: async () => {
                        const input = document.getElementById('sha256-input').value;
                        const textEncoder = new TextEncoder();
                        const data = textEncoder.encode(input);
                        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                        const hashArray = Array.from(new Uint8Array(hashBuffer));
                        const hexHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                        document.getElementById('sha256-output').innerText = hexHash;
                    }
                },
                {
                    id: 'random-password-generator',
                    name: 'Rastgele Şifre Oluşturucu',
                    description: 'Belirtilen uzunlukta rastgele bir şifre oluşturur.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <label for="rpg-length">Uzunluk:</label>
                            <input type="number" id="rpg-length" value="12" min="4" max="64">
                            <label><input type="checkbox" id="rpg-upper" checked> Büyük Harf</label>
                            <label><input type="checkbox" id="rpg-lower" checked> Küçük Harf</label>
                            <label><input type="checkbox" id="rpg-numbers" checked> Rakamlar</label>
                            <label><input type="checkbox" id="rpg-symbols" checked> Semboller</label>
                            <button data-tool-id="random-password-generator">Oluştur</button>
                            <div id="rpg-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const length = parseInt(document.getElementById('rpg-length').value);
                        const includeUpper = document.getElementById('rpg-upper').checked;
                        const includeLower = document.getElementById('rpg-lower').checked;
                        const includeNumbers = document.getElementById('rpg-numbers').checked;
                        const includeSymbols = document.getElementById('rpg-symbols').checked;

                        let chars = '';
                        if (includeUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                        if (includeLower) chars += 'abcdefghijklmnopqrstuvwxyz';
                        if (includeNumbers) chars += '0123456789';
                        if (includeSymbols) chars += '!@#$%^&*()_+[]{}|;:,.<>?';

                        if (chars.length === 0) {
                            document.getElementById('rpg-output').innerText = 'Lütfen en az bir karakter türü seçin.';
                            return;
                        }

                        let password = '';
                        for (let i = 0; i < length; i++) {
                            password += chars.charAt(Math.floor(Math.random() * chars.length));
                        }
                        document.getElementById('rpg-output').innerText = password;
                    }
                },
                {
                    id: 'uuid-generator',
                    name: 'UUID Oluşturucu',
                    description: 'Rastgele bir UUID (sürüm 4) oluşturur.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <button data-tool-id="uuid-generator">Oluştur</button>
                            <div id="uuid-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        document.getElementById('uuid-output').innerText = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                            return v.toString(16);
                        });
                    }
                },
                {
                    id: 'unix-timestamp-to-date',
                    name: 'Unix Zaman Damgası Dönüştürücü',
                    description: 'Unix zaman damgasını okunabilir tarihe dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="text" id="uts-input" placeholder="Unix zaman damgası (örn: 1678886400)">
                            <button data-tool-id="unix-timestamp-to-date">Dönüştür</button>
                            <div id="uts-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('uts-input').value;
                        const timestamp = parseInt(input) * 1000;
                        if (isNaN(timestamp)) {
                            document.getElementById('uts-output').innerText = 'Geçersiz zaman damgası.';
                            return;
                        }
                        const date = new Date(timestamp);
                        document.getElementById('uts-output').innerText = date.toUTCString();
                    }
                },
                {
                    id: 'date-to-unix-timestamp',
                    name: 'Tarihden Unix Zaman Damgası',
                    description: 'Okunabilir tarihi Unix zaman damgasına dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="datetime-local" id="dts-input">
                            <button data-tool-id="date-to-unix-timestamp">Dönüştür</button>
                            <div id="dts-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('dts-input').value;
                        if (!input) {
                            document.getElementById('dts-output').innerText = 'Lütfen bir tarih ve saat seçin.';
                            return;
                        }
                        const date = new Date(input);
                        if (isNaN(date.getTime())) {
                            document.getElementById('dts-output').innerText = 'Geçersiz tarih.';
                            return;
                        }
                        document.getElementById('dts-output').innerText = Math.floor(date.getTime() / 1000);
                    }
                },
                {
                    id: 'json-formatter',
                    name: 'JSON Biçimlendirici',
                    description: 'JSON metnini okunabilir formatta düzenler.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="jsonf-input" placeholder="JSON metni girin..." rows="8"></textarea>
                            <button data-tool-id="json-formatter">Biçimlendir</button>
                            <div id="jsonf-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('jsonf-input').value;
                        try {
                            const parsed = JSON.parse(input);
                            document.getElementById('jsonf-output').innerText = JSON.stringify(parsed, null, 2);
                        } catch (e) {
                            document.getElementById('jsonf-output').innerText = 'Hata: Geçersiz JSON formatı.';
                        }
                    }
                },
                {
                    id: 'xml-formatter',
                    name: 'XML Biçimlendirici (Basit)',
                    description: 'XML metnini basit bir şekilde biçimlendirir.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="xmlf-input" placeholder="XML metni girin..." rows="8"></textarea>
                            <button data-tool-id="xml-formatter">Biçimlendir</button>
                            <div id="xmlf-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('xmlf-input').value;
                        try {
                            const formattedXml = input.replace(/(>)(<)(\/*)/g, '$1\n$2$3')
                                                     .replace(/</g, '&lt;')
                                                     .replace(/>/g, '&gt;');
                            document.getElementById('xmlf-output').innerHTML = formattedXml;
                        } catch (e) {
                            document.getElementById('xmlf-output').innerText = 'Hata: Geçersiz XML formatı veya biçimlendirme hatası.';
                        }
                    }
                },
                {
                    id: 'color-picker',
                    name: 'Renk Seçici',
                    description: 'Bir renk seçer ve HEX, RGB, HSL değerlerini gösterir.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="color" id="cp-input" value="#10a37f" style="width: 100%; height: 50px;">
                            <button data-tool-id="color-picker">Değerleri Göster</button>
                            <div id="cp-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const color = document.getElementById('cp-input').value;
                        const hexToRgb = (hex) => {
                            const r = parseInt(hex.substring(1, 3), 16);
                            const g = parseInt(hex.substring(3, 5), 16);
                            const b = parseInt(hex.substring(5, 7), 16);
                            return { r, g, b };
                        };
                        const rgb = hexToRgb(color);

                        const rgbToHsl = (r, g, b) => {
                            r /= 255; g /= 255; b /= 255;
                            const max = Math.max(r, g, b);
                            const min = Math.min(r, g, b);
                            let h, s, l = (max + min) / 2;

                            if (max === min) { h = s = 0; }
                            else {
                                const d = max - min;
                                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                                switch (max) {
                                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                                    case g: h = (b - r) / d + 2; break;
                                    case b: h = (r - g) / d + 4; break;
                                }
                                h /= 6;
                            }
                            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
                        };
                        const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

                        document.getElementById('cp-output').innerHTML = `
                            HEX: ${color}<br>
                            RGB: rgb(${rgb.r}, ${rgb.g}, ${rgb.b})<br>
                            HSL: hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`
                        ;
                    }
                },
                {
                    id: 'unit-converter-length',
                    name: 'Birim Dönüştürücü (Uzunluk)',
                    description: 'Uzunluk birimleri arasında dönüşüm yapar (cm ↔ inç).',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="number" id="uc-length-input" placeholder="Değer girin">
                            <select id="uc-length-from">
                                <option value="cm">Santimetre (cm)</option>
                                <option value="inch">İnç (inç)</option>
                            </select>
                            <select id="uc-length-to">
                                <option value="inch">İnç (inç)</option>
                                <option value="cm">Santimetre (cm)</option>
                            </select>
                            <button data-tool-id="unit-converter-length">Dönüştür</button>
                            <div id="uc-length-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const value = parseFloat(document.getElementById('uc-length-input').value);
                        const fromUnit = document.getElementById('uc-length-from').value;
                        const toUnit = document.getElementById('uc-length-to').value;
                        let result;

                        if (isNaN(value)) {
                            document.getElementById('uc-length-output').innerText = 'Geçerli bir sayı girin.';
                            return;
                        }

                        if (fromUnit === toUnit) {
                            result = value;
                        } else if (fromUnit === 'cm' && toUnit === 'inch') {
                            result = value / 2.54;
                        } else if (fromUnit === 'inch' && toUnit === 'cm') {
                            result = value * 2.54;
                        }
                        document.getElementById('uc-length-output').innerText = `${result.toFixed(4)} ${toUnit}`;
                    }
                },
                {
                    id: 'binary-to-decimal',
                    name: 'İkili (Binary) -> Onluk (Decimal)',
                    description: 'İkili sayıyı onluk sayıya dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="text" id="b2d-input" placeholder="İkili sayıyı girin (örn: 10110)">
                            <button data-tool-id="binary-to-decimal">Dönüştür</button>
                            <div id="b2d-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('b2d-input').value.trim();
                        if (!/^[01]+$/.test(input)) {
                            document.getElementById('b2d-output').innerText = 'Geçersiz ikili sayı.';
                            return;
                        }
                        document.getElementById('b2d-output').innerText = parseInt(input, 2);
                    }
                },
                {
                    id: 'decimal-to-binary',
                    name: 'Onluk (Decimal) -> İkili (Binary)',
                    description: 'Onluk sayıyı ikili sayıya dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="number" id="d2b-input" placeholder="Onluk sayıyı girin (örn: 22)">
                            <button data-tool-id="decimal-to-binary">Dönüştür</button>
                            <div id="d2b-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = parseInt(document.getElementById('d2b-input').value);
                        if (isNaN(input)) {
                            document.getElementById('d2b-output').innerText = 'Geçersiz onluk sayı.';
                            return;
                        }
                        document.getElementById('d2b-output').innerText = input.toString(2);
                    }
                },
                {
                    id: 'base-converter',
                    name: 'Sayı Tabanı Dönüştürücü',
                    description: 'Sayıları farklı tabanlar arasında dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="text" id="bc-input" placeholder="Sayıyı girin">
                            <label for="bc-from">Kaynak Taban:</label>
                            <input type="number" id="bc-from" value="10" min="2" max="36">
                            <label for="bc-to">Hedef Taban:</label>
                            <input type="number" id="bc-to" value="16" min="2" max="36">
                            <button data-tool-id="base-converter">Dönüştür</button>
                            <div id="bc-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('bc-input').value.trim();
                        const fromBase = parseInt(document.getElementById('bc-from').value);
                        const toBase = parseInt(document.getElementById('bc-to').value);

                        if (isNaN(fromBase) || fromBase < 2 || fromBase > 36 ||
                            isNaN(toBase) || toBase < 2 || toBase > 36) {
                            document.getElementById('bc-output').innerText = 'Geçerli tabanlar (2-36) girin.';
                            return;
                        }

                        try {
                            const decimalValue = parseInt(input, fromBase);
                            if (isNaN(decimalValue)) {
                                document.getElementById('bc-output').innerText = 'Geçersiz sayı formatı veya taban.';
                                return;
                            }
                            document.getElementById('bc-output').innerText = decimalValue.toString(toBase).toUpperCase();
                        } catch (e) {
                            document.getElementById('bc-output').innerText = 'Hata: Dönüştürülemedi.';
                        }
                    }
                },
                {
                    id: 'case-converter',
                    name: 'Büyük/Küçük Harf Dönüştürücü',
                    description: 'Metnin harf durumunu değiştirir (büyük, küçük, başlık).',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="case-input" placeholder="Metni girin..." rows="4"></textarea>
                            <select id="case-type">
                                <option value="upper">BÜYÜK HARF</option>
                                <option value="lower">küçük harf</option>
                                <option value="capitalize">Başlık Haline Getir</option>
                            </select>
                            <button data-tool-id="case-converter">Dönüştür</button>
                            <div id="case-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('case-input').value;
                        const type = document.getElementById('case-type').value;
                        let output = '';

                        if (type === 'upper') {
                            output = input.toUpperCase();
                        } else if (type === 'lower') {
                            output = input.toLowerCase();
                        } else if (type === 'capitalize') {
                            output = input.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
                        }
                        document.getElementById('case-output').innerText = output;
                    }
                },
                {
                    id: 'slug-converter',
                    name: 'Metin Slug Dönüştürücü',
                    description: 'Metni SEO dostu bir "slug"a dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="slug-input" placeholder="Başlık veya metni girin..." rows="4"></textarea>
                            <button data-tool-id="slug-converter">Dönüştür</button>
                            <div id="slug-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('slug-input').value;
                        const slug = input
                            .toString()
                            .normalize('NFD')
                            .replace(/[\u0300-\u036f]/g, '')
                            .toLowerCase()
                            .trim()
                            .replace(/\s+/g, '-')
                            .replace(/[^\w-]+/g, '')
                            .replace(/--+/g, '-');
                        document.getElementById('slug-output').innerText = slug;
                    }
                },
                {
                    id: 'simple-calculator',
                    name: 'Basit Hesap Makinesi',
                    description: 'Temel aritmetik işlemler yapar.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="text" id="calc-input" placeholder="Örn: 5 + 3 * 2">
                            <button data-tool-id="simple-calculator">Hesapla</button>
                            <div id="calc-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const expression = document.getElementById('calc-input').value;
                        try {
                            const result = eval(expression);
                            document.getElementById('calc-output').innerText = result;
                        } catch (e) {
                            document.getElementById('calc-output').innerText = 'Hata: Geçersiz ifade.';
                        }
                    }
                },
                {
                    id: 'random-number-generator',
                    name: 'Rastgele Sayı Oluşturucu',
                    description: 'Belirtilen aralıkta rastgele bir tam sayı oluşturur.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <label for="rng-min">Minimum:</label>
                            <input type="number" id="rng-min" value="1">
                            <label for="rng-max">Maksimum:</label>
                            <input type="number" id="rng-max" value="100">
                            <button data-tool-id="random-number-generator">Oluştur</button>
                            <div id="rng-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const min = parseInt(document.getElementById('rng-min').value);
                        const max = parseInt(document.getElementById('rng-max').value);
                        if (isNaN(min) || isNaN(max) || min > max) {
                            document.getElementById('rng-output').innerText = 'Geçersiz min/max değerleri.';
                            return;
                        }
                        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
                        document.getElementById('rng-output').innerText = randomNumber;
                    }
                },
                {
                    id: 'ip-lookup',
                    name: 'IP Adresi Bilgisi',
                    description: 'Bir IP adresinin coğrafi bilgilerini bulur.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="text" id="iplookup-input" placeholder="IP Adresi (örn: 8.8.8.8)">
                            <button data-tool-id="ip-lookup">Ara</button>
                            <div id="iplookup-output" class="tool-output"></div>
                        `;
                    },
                    execute: async () => {
                        const ip = document.getElementById('iplookup-input').value.trim();
                        if (!ip) {
                            document.getElementById('iplookup-output').innerText = 'Lütfen bir IP adresi girin.';
                            return;
                        }
                        document.getElementById('iplookup-output').innerText = 'Aranıyor...';
                        try {
                            const response = await fetch(`https://ipapi.co/${ip}/json/`);
                            const data = await response.json();
                            if (data.error) {
                                document.getElementById('iplookup-output').innerText = `Hata: ${data.reason || 'IP bilgisi alınamadı.'}`;
                                return;
                            }
                            document.getElementById('iplookup-output').innerHTML = `
                                IP: ${data.ip}<br>
                                Şehir: ${data.city}<br>
                                Bölge: ${data.region}<br>
                                Ülke: ${data.country_name} (${data.country_code})<br>
                                ISP: ${data.org}
                            `;
                        } catch (e) {
                            document.getElementById('iplookup-output').innerText = 'Ağ hatası veya geçersiz IP.';
                        }
                    }
                },
                {
                    id: 'text-to-speech',
                    name: 'Metinden Konuşmaya',
                    description: 'Yazılan metni sesli olarak okur.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="tts-input" placeholder="Okunacak metni girin..." rows="4"></textarea>
                            <button data-tool-id="text-to-speech">Oku</button>
                            <div id="tts-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const text = document.getElementById('tts-input').value;
                        if (!text) {
                            document.getElementById('tts-output').innerText = 'Metin girin.';
                            return;
                        }
                        if ('speechSynthesis' in window) {
                            const utterance = new SpeechSynthesisUtterance(text);
                            window.speechSynthesis.speak(utterance);
                            document.getElementById('tts-output').innerText = 'Okunuyor...';
                        } else {
                            document.getElementById('tts-output').innerText = 'Tarayıcınız metin okuma özelliğini desteklemiyor.';
                        }
                    }
                },
                {
                    id: 'qr-code-generator',
                    name: 'QR Kod Oluşturucu',
                    description: 'Verilen metinden QR kodu oluşturur.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="text" id="qr-input" placeholder="QR kod için metin veya URL girin">
                            <button data-tool-id="qr-code-generator">Oluştur</button>
                            <div id="qr-output" class="tool-output" style="text-align: center;"></div>
                        `;
                    },
                    execute: () => {
                        const text = document.getElementById('qr-input').value.trim();
                        if (!text) {
                            document.getElementById('qr-output').innerHTML = 'Metin veya URL girin.';
                            return;
                        }
                        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(text)}`;
                        document.getElementById('qr-output').innerHTML = `<img src="${qrApiUrl}" alt="QR Code">`;
                    }
                },
                {
                    id: 'data-url-converter',
                    name: 'Dosyadan Data URL',
                    description: 'Küçük bir dosyayı (resim vb.) Data URL formatına dönüştürür.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <input type="file" id="dataurl-input">
                            <button data-tool-id="data-url-converter">Dönüştür</button>
                            <textarea id="dataurl-output" class="tool-output" rows="6"></textarea>
                        `;
                    },
                    execute: () => {
                        const fileInput = document.getElementById('dataurl-input');
                        const output = document.getElementById('dataurl-output');
                        if (fileInput.files.length === 0) {
                            output.value = 'Lütfen bir dosya seçin.';
                            return;
                        }
                        const file = fileInput.files[0];
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            output.value = e.target.result;
                        };
                        reader.onerror = (e) => {
                            output.value = 'Dosya okuma hatası.';
                        };
                        reader.readAsDataURL(file);
                    }
                },
                {
                    id: 'line-sorter',
                    name: 'Metin Satır Sıralayıcı',
                    description: 'Metindeki satırları alfabetik olarak sıralar.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="linesort-input" placeholder="Her satırda bir öğe olacak şekilde metin girin..." rows="6"></textarea>
                            <button data-tool-id="line-sorter">Sırala</button>
                            <div id="linesort-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('linesort-input').value;
                        const lines = input.split('\n').filter(line => line.trim() !== '');
                        lines.sort();
                        document.getElementById('linesort-output').innerText = lines.join('\n');
                    }
                },
                {
                    id: 'duplicate-line-remover',
                    name: 'Tekrarlayan Satır Silici',
                    description: 'Metindeki tekrarlayan satırları kaldırır.',
                    render: (toolDiv) => {
                        toolDiv.innerHTML = `
                            <textarea id="dedup-input" placeholder="Her satırda bir öğe olacak şekilde metin girin..." rows="6"></textarea>
                            <button data-tool-id="duplicate-line-remover">Tekrarları Kaldır</button>
                            <div id="dedup-output" class="tool-output"></div>
                        `;
                    },
                    execute: () => {
                        const input = document.getElementById('dedup-input').value;
                        const lines = input.split('\n').map(line => line.trim()).filter(line => line !== '');
                        const uniqueLines = [...new Set(lines)];
                        document.getElementById('dedup-output').innerText = uniqueLines.join('\n');
                    }
                }
            ];

            tools.forEach(tool => {
                const toolCard = document.createElement('div');
                toolCard.className = 'tool-card';
                toolCard.innerHTML = `<h3>${tool.name}</h3><p>${tool.description}</p>`;
                const toolContentDiv = document.createElement('div');
                toolCard.appendChild(toolContentDiv);
                tool.render(toolContentDiv);
                toolboxContainer.appendChild(toolCard);

                const button = toolContentDiv.querySelector('button[data-tool-id]');
                if (button) {
                    button.onclick = tool.execute;
                }
            });
        });
    </script>
</body>
</html>
